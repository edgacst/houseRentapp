services:
  postgres:
    image: postgres:16-alpine
    container_name: houserent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: houserent
    ports:
      - "55432:5432"
    volumes:
      - houserent-postgres-data:/var/lib/postgresql/data

volumes:
  houserent-postgres-data:
